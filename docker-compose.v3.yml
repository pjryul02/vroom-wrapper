###############################################################
# VROOM Wrapper v3.0 - Docker Compose
#
# 4개 서비스:
#   1. osrm     - OSRM 라우팅 엔진 (포트 5000)
#   2. valhalla - Valhalla 라우팅 엔진 (포트 8002)
#   3. redis    - 캐싱 (선택)
#   4. wrapper  - Python Wrapper + VROOM 바이너리 (통합!)
###############################################################

version: '3.8'

services:
  # ──────────────────────────────────────────────────
  # OSRM 라우팅 엔진
  # ──────────────────────────────────────────────────
  osrm:
    image: ghcr.io/project-osrm/osrm-backend:latest
    container_name: osrm-server
    ports:
      - "5000:5000"
    volumes:
      - /home/shawn/osrm-data:/data
    command: >
      osrm-routed
      --algorithm mld
      /data/south-korea-latest.osrm
      --max-table-size 10000
      --port 5000
      --ip 0.0.0.0
    restart: unless-stopped
    networks:
      - routing-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/nearest/v1/driving/127.0,37.5 > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ──────────────────────────────────────────────────
  # Valhalla 라우팅 엔진
  #
  # 최초 실행: PBF → 타일 자동 빌드 (한국 255MB ≈ 15~30분)
  # 이후 재시작: 빌드된 타일 재사용 (수 초 내 기동)
  # ──────────────────────────────────────────────────
  valhalla:
    image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
    container_name: valhalla-server
    ports:
      - "8002:8002"
    volumes:
      - /home/shawn/valhalla-data/custom_files:/custom_files       # PBF 소스 (심볼릭 링크)
      - /home/shawn/valhalla-data/valhalla_tiles:/valhalla_tiles   # 빌드된 타일 저장
    environment:
      - use_tiles_ignore_pbf=False   # 타일 없으면 PBF에서 빌드
      - force_rebuild=False          # 타일 있으면 재빌드 안 함
      - build_elevation=False        # 고도 데이터 생략 (시간/용량 절약)
      - build_admins=True            # 행정구역 빌드 (라우팅 품질 향상)
      - build_time_zones=True        # 타임존 빌드
      - server_threads=4
    restart: unless-stopped
    networks:
      - routing-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8002/status > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 1800s  # 타일 빌드 시간 허용 (최대 30분)

  # ──────────────────────────────────────────────────
  # Redis 캐싱
  # ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vroom-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - routing-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ──────────────────────────────────────────────────
  # VROOM Wrapper v3.0 + VROOM 바이너리 (통합)
  #
  # vroom-express 제거!
  # VROOM C++ 바이너리가 이 컨테이너 안에 내장됨
  # subprocess stdin/stdout 파이프로 직접 호출
  # ──────────────────────────────────────────────────
  wrapper:
    build:
      context: .
      dockerfile: Dockerfile.v3
    container_name: vroom-wrapper-v3
    ports:
      - "8000:8000"
    environment:
      # v3.0: VROOM 직접 호출
      - USE_DIRECT_CALL=true
      - VROOM_BINARY_PATH=/usr/local/bin/vroom
      - VROOM_ROUTER=osrm
      - VROOM_THREADS=4
      - VROOM_EXPLORATION=5
      - VROOM_TIMEOUT=300

      # OSRM 연결 (컨테이너 내부 네트워크)
      - OSRM_URL=http://osrm:5000

      # Valhalla 연결
      - VALHALLA_URL=http://valhalla:8002
      - VALHALLA_CHUNK_SIZE=50
      - VALHALLA_MAX_WORKERS=4

      # 2-Pass 최적화
      - TWO_PASS_ENABLED=true
      - TWO_PASS_MAX_WORKERS=4
      - TWO_PASS_INITIAL_THREADS=16
      - TWO_PASS_ROUTE_THREADS=4

      # HGLIS 매트릭스 사전 계산
      - MATRIX_PREP_ENABLED=true

      # 도달 불가능 필터링
      - UNREACHABLE_FILTER_ENABLED=true
      - UNREACHABLE_THRESHOLD=43200

      # OSRM 매트릭스 청킹
      - OSRM_CHUNK_SIZE=75
      - OSRM_MAX_WORKERS=8

      # Redis
      - REDIS_URL=redis://redis:6379

      # 동시 실행 제한
      - MAX_CONCURRENT_DISPATCH=3

      # 로그
      - LOG_LEVEL=DEBUG
      - PYTHONUNBUFFERED=1
    depends_on:
      osrm:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - routing-network
      - routing-net
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────────────────────
  # Celery Worker — 비동기 dispatch 처리
  # ──────────────────────────────────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.v3
    container_name: vroom-celery-worker
    command: python -m celery -A src.services.celery_app.celery_app worker --loglevel=info --concurrency=3
    environment:
      - USE_DIRECT_CALL=true
      - VROOM_BINARY_PATH=/usr/local/bin/vroom
      - VROOM_ROUTER=osrm
      - VROOM_THREADS=4
      - VROOM_EXPLORATION=5
      - VROOM_TIMEOUT=300
      - OSRM_URL=http://osrm:5000
      - VALHALLA_URL=http://valhalla:8002
      - REDIS_URL=redis://redis:6379
      - TWO_PASS_ENABLED=true
      - TWO_PASS_MAX_WORKERS=4
      - MATRIX_PREP_ENABLED=true
      - UNREACHABLE_FILTER_ENABLED=true
      - UNREACHABLE_THRESHOLD=43200
      - OSRM_CHUNK_SIZE=75
      - OSRM_MAX_WORKERS=8
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    depends_on:
      osrm:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - routing-network
      - routing-net
    volumes:
      - ./logs:/app/logs

volumes:
  redis-data:
    driver: local

networks:
  routing-network:
    driver: bridge
  routing-net:
    external: true
