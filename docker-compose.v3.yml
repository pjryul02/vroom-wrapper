###############################################################
# VROOM Wrapper v3.0 - Docker Compose
#
# 3개 서비스 (vroom-express 제거):
#   1. osrm    - OSRM 라우팅 엔진
#   2. redis   - 캐싱 (선택)
#   3. wrapper - Python Wrapper + VROOM 바이너리 (통합!)
###############################################################

version: '3.8'

services:
  # ──────────────────────────────────────────────────
  # OSRM 라우팅 엔진
  # ──────────────────────────────────────────────────
  osrm:
    image: ghcr.io/project-osrm/osrm-backend:latest
    container_name: osrm-server
    ports:
      - "5000:5000"
    volumes:
      - /home/shawn/osrm-data:/data
    command: >
      osrm-routed
      --algorithm mld
      /data/south-korea-latest.osrm
      --max-table-size 10000
      --port 5000
      --ip 0.0.0.0
    restart: unless-stopped
    networks:
      - routing-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/nearest/v1/driving/127.0,37.5 > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ──────────────────────────────────────────────────
  # Redis 캐싱
  # ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vroom-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - routing-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ──────────────────────────────────────────────────
  # VROOM Wrapper v3.0 + VROOM 바이너리 (통합)
  #
  # vroom-express 제거!
  # VROOM C++ 바이너리가 이 컨테이너 안에 내장됨
  # subprocess stdin/stdout 파이프로 직접 호출
  # ──────────────────────────────────────────────────
  wrapper:
    build:
      context: .
      dockerfile: Dockerfile.v3
    container_name: vroom-wrapper-v3
    ports:
      - "8000:8000"
    environment:
      # v3.0: VROOM 직접 호출
      - USE_DIRECT_CALL=true
      - VROOM_BINARY_PATH=/usr/local/bin/vroom
      - VROOM_ROUTER=osrm
      - VROOM_THREADS=4
      - VROOM_EXPLORATION=5
      - VROOM_TIMEOUT=300

      # OSRM 연결 (컨테이너 내부 네트워크)
      - OSRM_URL=http://osrm:5000

      # 2-Pass 최적화 (대규모 문제에서 활성화)
      - TWO_PASS_ENABLED=false
      - TWO_PASS_MAX_WORKERS=4
      - TWO_PASS_INITIAL_THREADS=16
      - TWO_PASS_ROUTE_THREADS=4

      # 도달 불가능 필터링
      - UNREACHABLE_FILTER_ENABLED=true
      - UNREACHABLE_THRESHOLD=43200

      # OSRM 매트릭스 청킹
      - OSRM_CHUNK_SIZE=75
      - OSRM_MAX_WORKERS=8

      # Redis
      - REDIS_URL=redis://redis:6379

      # 로그
      - LOG_LEVEL=INFO
    depends_on:
      osrm:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - routing-network
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis-data:
    driver: local

networks:
  routing-network:
    driver: bridge
